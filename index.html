<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player: Music for everyone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="close">
                <img src="close.svg" alt="" style="display: none;">
            </div>
            <div class="home">
                <div class="logo"><img width="150px" src="logo.svg" alt="logo"></div>
                <ul>
                    <li><img src="home.svg" alt="home"> Home</li>
                    <li><img src="search.svg" alt="search">Search</li>
                </ul>
            </div>
            <div class="library">
                <div class="heading">
                    <img src="library.svg" alt="">
                    <h2>Your library</h2>
                </div>
                <div class="songlist">
                    <ul id="playlist"></ul>
                </div>

                <div class="footer">
                    <!-- Footer content -->
                </div>
            </div>
        </div>
        <div class="right">
            <div class="header">
                <div class="nav">
                    <div style="display: flex; align-items: center; justify-content: center;">
                        <img width="40px" height="40px" class="hamburger" src="hamburger.svg" alt="">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#000000" fill="white">
                            <path d="M15 6C15 6 9.00001 10.4189 9 12C8.99999 13.5812 15 18 15 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#000000" fill="white">
                            <path d="M9.00005 6C9.00005 6 15 10.4189 15 12C15 13.5812 9 18 9 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </div>
                </div>
                <div class="button">
                    <button class="signupbtn">Sign up</button>
                    <button class="loginbtn">Log in</button>
                </div>
            </div>
            <div class="spotify-playlist">
                <h1>Spotify Playlist</h1>
                <div class="card-container">
                    <div class="card">
                        <div class="play">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#000000" fill="none">
                                <path d="M18.8906 12.846C18.5371 14.189 16.8667 15.138 13.5257 17.0361C10.296 18.8709 8.6812 19.7884 7.37983 19.4196C6.8418 19.2671 6.35159 18.9776 5.95624 18.5787C5 17.6139 5 15.7426 5 12C5 8.2574 5 6.3861 5.95624 5.42132C6.35159 5.02245 6.8418 4.73288 7.37983 4.58042C8.6812 4.21165 10.296 5.12907 13.5257 6.96393C16.8667 8.86197 18.5371 9.811 18.8906 11.154C19.0365 11.7084 19.0365 12.2916 18.8906 12.846Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div>
                            <img src="pictures/RT.jpg" alt="">
                            <h2>Relaxing Music</h2>
                            <p>Relax your mind....!</p>
                        </div>
                    </div>
                </div>
                <div class="playBar">
                    <div class="songinfo"></div>
                    <div class="playbuttons">
                        <img src="previous.svg" alt="Previous" id="previous">
                        <img src="play.svg" alt="Play" id="play">
                        <img src="pause.svg" alt="Pause" id="pause" style="display: none;">
                        <img src="next.svg" alt="Next" id="next">
                    </div>
                    <div class="timevol"></div>
                    <div class="volume">
                        <div class="songtime">
                            <!-- Placeholder for song time or other content -->
                        </div>
                        <img height="20px" src="volume.svg" alt="Volume Icon">
                        <div class="range">
                            <input type="range" name="volume" id="volumeRange" min="0" max="100" value="50" step="1">
                        </div>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="new.js"></script>
</body>
</html>
